services:
  mariadb:
    profiles: ["docker-db"]
    image: mariadb:11
    network_mode: host
    command: --sql_mode=ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS:-zotrootpass}
      MARIADB_USER: ${DB_USER:-zotero}
      MARIADB_PASSWORD: ${DB_PASS:-zotropass}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATASERVER_REF: master
        ZOTERO_API_PORT: ${ZOTERO_API_PORT:-23231}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        NO_PROXY: ${NO_PROXY:-}
        no_proxy: ${no_proxy:-}
    network_mode: host
    environment:
      - MYSQL_HOST=${DB_HOST:-127.0.0.1}
      - MYSQL_PORT=${DB_PORT:-3306}
      - DB_HOST=${DB_HOST:-127.0.0.1}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-zotero}
      - DB_PASS=${DB_PASS:-zotropass}
      - DB_NAME=${DB_NAME:-zotero}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-adminpass}
      - AUTH_SALT=${AUTH_SALT:-dev-salt-change-in-production}
      - S3_ENDPOINT=127.0.0.1:${MINIO_PORT:-9000}
      - S3_PUBLIC_ENDPOINT=${S3_PUBLIC_ENDPOINT:-http://localhost:${MINIO_PORT:-9000}}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - REDIS_HOST=${REDIS_HOST:-127.0.0.1}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      minio:
        condition: service_healthy

  minio:
    image: minio/minio
    network_mode: host
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  stream:
    build:
      context: .
      dockerfile: Dockerfile.stream
      args:
        STREAM_PORT: ${STREAM_PORT:-8082}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        NO_PROXY: ${NO_PROXY:-}
        no_proxy: ${no_proxy:-}
    network_mode: host
    environment:
      - NODE_ENV=production
      - REDIS_HOST=${REDIS_HOST:-127.0.0.1}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - STREAM_PORT=${STREAM_PORT:-8082}
      - API_URL=${API_URL:-https://api.zotero.org/}

volumes:
  mariadb_data:
  minio_data:
