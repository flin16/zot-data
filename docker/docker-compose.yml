services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATASERVER_REF: master
    ports:
      - "${ZOTERO_API_PORT:-23231}:80"
    environment:
      - MYSQL_HOST=${MYSQL_HOST:-host.docker.internal}
      - MYSQL_USER=${MYSQL_USER:-zotero}
      - ZOTERO_MYSQL_PASS=${ZOTERO_MYSQL_PASS:-zotropass}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-zotero}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-adminpass}
      - S3_ENDPOINT=minio:${MINIO_PORT:-9000}
      - S3_PUBLIC_ENDPOINT=${S3_PUBLIC_ENDPOINT:-http://localhost:${MINIO_PORT:-9000}}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - dataserver

  minio:
    image: minio/minio
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dataserver

volumes:
  minio_data:

networks:
  dataserver:
    driver: bridge
